<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Health Group | Tertiary Care & Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        :root {
            --brand-navy: #0f172a;
            --brand-gold: #b45309;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .stat-card {
            border-left: 4px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover {
            border-left-color: var(--brand-gold);
            background: #fff;
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05);
        }

        /* Modal Animation */
        #specializationModal {
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-content {
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        #specializationModal.active {
            opacity: 1 !important;
            visibility: visible !important;
        }
        #specializationModal.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900 overflow-x-hidden">


    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center">
                    <a href="#" class="text-xl md:text-2xl font-bold tracking-tighter text-slate-900 uppercase">
                        Apellido<span class="text-amber-700">Health</span>
                    </a>
                </div>
                <div class="hidden lg:flex space-x-10 text-sm font-semibold text-slate-500 uppercase tracking-wider">
                    <a href="index.html" class="text-amber-700">Home</a>
                    <a href="Institutes.html" class="hover:text-amber-700 transition">Institutes</a>
                    <a href="research.html" class="hover:text-amber-700 transition">Research</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative pt-12 md:pt-20 pb-20 md:pb-32">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-16 text-center lg:text-left">
                <div class="w-full lg:w-1/2">
                    <h1 class="text-4xl md:text-5xl lg:text-7xl font-bold text-slate-900 leading-[1.1] mb-8">
                        The future of medicine, <br><span class="italic text-slate-500 font-light">delivered today.</span>
                    </h1>
                    <p class="text-lg text-slate-600 mb-10 max-w-lg mx-auto lg:mx-0">
                        Pioneering clinical excellence and research to provide the most advanced care for our community.
                    </p>
                    <a href="Institutes.html" 
                            class="inline-block bg-slate-900 text-white px-10 py-4 font-bold rounded-sm hover:bg-slate-800 transition">
                        Explore Institutes
                    </a>
                </div>
                <div class="w-full lg:w-1/2">
                    <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=1200" class="rounded shadow-2xl h-[400px] w-full object-cover">
                </div>
            </div>
        </div>
    </header>


    <div id="specializationModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 opacity-0 invisible bg-slate-900/60 backdrop-blur-sm">
        <div class="modal-content bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-sm shadow-2xl relative">
            
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>

            <div id="modalBody" class="p-8 md:p-12">
                </div>

            <div class="bg-slate-50 p-6 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal()" class="bg-slate-900 text-white px-6 py-2 text-sm font-bold rounded-sm">Close Details</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center lg:text-left">
            <p class="text-xs text-slate-400 uppercase tracking-widest">© 2026 Aegis Health Group | New Carmen, Tacurong City</p>
        </div>
    </footer>
    
</body>
</html>
